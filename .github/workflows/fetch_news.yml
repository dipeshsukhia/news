name: Fetch Data and Commit

# Runs every 6 hours so the script can merge new API results into the
# existing 7-day rolling cache (up to 100 unique articles per file).
on:
  schedule:
    - cron: '0 */6 * * *'

  # Manual run from the Actions tab.
  workflow_dispatch:

  # Re-run when the fetch script or this workflow changes — not on data commits.
  push:
    branches:
      - main
    paths:
      - 'py-script/fetch_news.py'
      - '.github/workflows/fetch_news.yml'

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: news

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Fetch and merge news data
        working-directory: news
        run: python py-script/fetch_news.py ${{ secrets.News_API_KEY }}

      - name: Commit rolling news cache
        working-directory: news
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"

          # Stage only JSON data files updated by fetch_news.py
          git add docs/data/

          if git diff --staged --quiet; then
            echo "No changes to docs/data/ — nothing to commit"
            exit 0
          fi

          git commit -m "Update news data [skip ci]"
          git push origin main
